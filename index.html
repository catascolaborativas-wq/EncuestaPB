<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Encuesta · Podium Beer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0.5rem;
    }
    .hero-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background-image: url('assets/bg_cerveceria.jpg');
      background-size: cover;
      background-position: center;
    }
    .overlay-color {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #06232E;
      opacity: 0.57;
      z-index: -1;
    }
    .vignette {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 0;
    }
    .app-container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .logo-header {
      display: block;
      margin: 0 auto 1rem auto;
      width: 60%;
      max-width: 200px;
      height: auto;
    }
    /* Tarjetas glass */
    .glass-card {
      background: rgba(6,35,46,0.35);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      padding: 1.8rem 1.5rem;
      transition: transform 0.2s ease;
      position: relative;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      left: 11px;
      top: -10px;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background-image: url('assets/espejo.png');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
      pointer-events: none;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #f7c32f;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .question-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 1.2rem;
      line-height: 1.3;
      border-left: 5px solid #e32c6c;
      padding-left: 1rem;
    }
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .option-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #e32c6c;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .option-label {
      color: #FFFFFF;
      font-size: 1rem;
      line-height: 1.4;
      font-weight: 500;
    }
    .option-desc {
      display: block;
      font-size: 0.8rem;
      color: #CFDEE0;
      font-weight: 400;
      margin-top: 0.2rem;
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .btn {
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(228,15,99,0.5);
      transition: transform 0.1s ease, filter 0.1s ease;
      font-weight: 700;
      font-size: 1rem;
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.2);
      min-width: 200px;
    }
    .btn:active { transform: scale(0.97); filter: brightness(0.92); }
    .btn-secondary {
      background: rgba(0,0,0,0.6);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .social-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0 0.5rem;
    }
    .social-icon {
      width: 36px;
      height: 36px;
      transition: transform 0.2s;
    }
    .social-icon:hover {
      transform: scale(1.1);
    }
    .credits {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #f7c32f;
      background: rgba(0,0,0,0.5);
      padding: 0.75rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-top: 1rem;
    }
    .status-message {
      color: #f7c32f;
      text-align: center;
      min-height: 1.8rem;
      font-weight: 500;
    }
    .admin-download {
      text-align: center;
      margin-top: 0.5rem;
    }
    .admin-btn {
      background: transparent;
      border: 1px dashed #f7c32f;
      color: #f7c32f;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0.7;
    }
    @media (max-width: 600px) {
      .glass-card { padding: 1.5rem 1rem; }
      .question-text { font-size: 1.2rem; }
      .btn { padding: 10px 18px; min-width: 160px; }
      .social-icon { width: 30px; height: 30px; }
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="overlay-color"></div>
  <div class="vignette"></div>

  <div class="app-container">
    <div class="header">
      <img src="assets/Logo_Desde.png" alt="Podium Beer" class="logo-header">
    </div>

    <div id="questionsContainer" class="questions-list" style="display: flex; flex-direction: column; gap: 1.8rem;"></div>

    <div class="action-bar">
      <button class="btn" id="submitAnswersBtn">📤 Enviar respuestas</button>
      <button class="btn btn-secondary" id="clearAllBtn">🧹 Limpiar selecciones</button>
    </div>
    <div id="exportStatus" class="status-message"></div>

    <!-- Redes sociales -->
    <div class="social-bar">
      <a href="https://www.instagram.com/catascolaborativascl/" target="_blank" rel="noopener">
        <img src="assets/icon_instagram.png" alt="Instagram" class="social-icon">
      </a>
      <a href="https://catascolaborativas.cl/" target="_blank" rel="noopener">
        <img src="assets/icon_web.png" alt="Sitio Web" class="social-icon">
      </a>
      <a href="https://wa.me/56952184980" target="_blank" rel="noopener">
        <img src="assets/icon_wpp.png" alt="WhatsApp" class="social-icon">
      </a>
    </div>

    <!-- Créditos -->
    <div class="credits">
      Un desarrollo de Catas Colaborativas. Difundiendo Cultura Cervecera desde 2015
    </div>

    <!-- Botón de administrador (solo visible con ?admin) -->
    <div id="adminPanel" class="admin-download" style="display: none;">
      <button class="admin-btn" id="downloadAllDataBtn">📥 Descargar consolidado (Admin)</button>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const STORAGE_KEY = 'encuesta_respuestas';

      const questionsData = [
        { id: 'q1', emoji: '💸', text: '¿Cómo decides qué cerveza producir?', options: [ /* ... igual que antes ... */ ] },
        { id: 'q2', emoji: '💸', text: '¿Qué pesa más al tomar decisiones?', options: [ /* ... */ ] },
        { id: 'q3', emoji: '🍺', text: '¿Cómo defines tu línea de cervezas?', options: [ /* ... */ ] },
        { id: 'q4', emoji: '🍺', text: '¿Sigues tendencias o haces lo que te gusta?', options: [ /* ... */ ] },
        { id: 'q5', emoji: '🏆', text: '¿Por qué eliges los concursos?', options: [ /* ... */ ] },
        { id: 'q6', emoji: '🏆', text: '¿Cómo eliges qué cerveza enviar?', options: [ /* ... */ ] },
        { id: 'q7', emoji: '🏆', text: '¿Con qué frecuencia participas?', options: [ /* ... */ ] },
        { id: 'q8', emoji: '🥇', text: '¿Las medallas te han generado ventas?', options: [ /* ... */ ] },
        { id: 'q9', emoji: '🥇', text: '¿Usas las medallas en tu comunicación?', options: [ /* ... */ ] },
        { id: 'q10', emoji: '📊', text: '¿Para ti los concursos valen la pena?', options: [ /* ... */ ] },
        { id: 'q11', emoji: '📊', text: '¿Qué te frena para participar más?', options: [ /* ... */ ] },
        { id: 'q12', emoji: '🧠', text: '¿Sabes tu posición en el mercado?', options: [ /* ... */ ] },
        { id: 'q13', emoji: '🌍', text: '¿Cómo ves el futuro del mercado?', options: [ /* ... */ ] }
      ];

      const container = document.getElementById('questionsContainer');
      const submitBtn = document.getElementById('submitAnswersBtn');
      const clearBtn = document.getElementById('clearAllBtn');
      const statusEl = document.getElementById('exportStatus');

      // ----- Renderizar preguntas -----
      function renderQuestions() {
        let html = '';
        questionsData.forEach((q, index) => {
          html += `
            <div class="glass-card" data-qid="${q.id}">
              <div class="section-title">${q.emoji} PREGUNTA ${index+1}</div>
              <div class="question-text">${q.text}</div>
              <div class="options-grid">
          `;
          q.options.forEach((opt, optIdx) => {
            const inputId = `${q.id}_opt${optIdx}`;
            html += `
                <div class="option-item">
                  <input type="checkbox" id="${inputId}" name="${q.id}" value="${opt.value}">
                  <label for="${inputId}" class="option-label">
                    ${opt.label}
                    <span class="option-desc">${opt.desc}</span>
                  </label>
                </div>
            `;
          });
          html += `</div></div>`;
        });
        container.innerHTML = html;
      }

      // ----- Recolectar respuestas (objeto con pregunta y seleccionadas) -----
      function collectAnswers() {
        const answers = [];
        questionsData.forEach(q => {
          const checkboxes = document.querySelectorAll(`input[name="${q.id}"]:checked`);
          const selectedLabels = Array.from(checkboxes).map(cb => {
            const label = document.querySelector(`label[for="${cb.id}"]`);
            return label ? label.childNodes[0].nodeValue.trim() : cb.value;
          });
          const selectedValues = Array.from(checkboxes).map(cb => cb.value);
          answers.push({
            questionId: q.id,
            questionText: q.text,
            selectedLabels: selectedLabels,
            selectedValues: selectedValues
          });
        });
        return answers;
      }

      // ----- Guardar respuesta en localStorage (acumulativo) -----
      function saveResponseToStorage(answers) {
        const stored = localStorage.getItem(STORAGE_KEY);
        let allResponses = stored ? JSON.parse(stored) : [];
        const responseRecord = {
          timestamp: new Date().toISOString(),
          answers: answers
        };
        allResponses.push(responseRecord);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allResponses));
      }

      // ----- Enviar respuestas (guardar y limpiar) -----
      function handleSubmit() {
        const answers = collectAnswers();
        if (answers.every(a => a.selectedLabels.length === 0)) {
          statusEl.textContent = '⚠️ Por favor selecciona al menos una opción en alguna pregunta.';
          setTimeout(() => statusEl.textContent = '', 3000);
          return;
        }
        saveResponseToStorage(answers);
        clearAllSelections();
        statusEl.textContent = '✅ ¡Gracias! Tus respuestas han sido registradas.';
        setTimeout(() => statusEl.textContent = '', 4000);
      }

      // ----- Limpiar todas las selecciones (sin borrar storage) -----
      function clearAllSelections() {
        const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
        allCheckboxes.forEach(cb => cb.checked = false);
      }

      // ----- Descargar todos los datos acumulados como CSV (solo admin) -----
      function downloadAllDataAsCSV() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) {
          alert('No hay respuestas guardadas aún.');
          return;
        }
        const allResponses = JSON.parse(stored);
        let csvRows = [];
        // Cabecera: timestamp + preguntas
        const questionHeaders = questionsData.map(q => q.text.replace(/,/g, ';'));
        csvRows.push(['Timestamp', ...questionHeaders].join(','));

        allResponses.forEach(record => {
          const row = [record.timestamp];
          questionsData.forEach(q => {
            const answerObj = record.answers.find(a => a.questionId === q.id);
            const answerStr = answerObj ? answerObj.selectedLabels.join('; ') : '';
            row.push(`"${answerStr}"`);
          });
          csvRows.push(row.join(','));
        });

        const csvString = csvRows.join('\n');
        const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `consolidado_encuesta_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // ----- Mostrar panel admin si la URL tiene ?admin -----
      function checkAdminMode() {
        if (window.location.search.includes('admin')) {
          document.getElementById('adminPanel').style.display = 'block';
          document.getElementById('downloadAllDataBtn').addEventListener('click', downloadAllDataAsCSV);
        }
      }

      // ----- Inicializar -----
      function init() {
        renderQuestions();
        submitBtn.addEventListener('click', handleSubmit);
        clearBtn.addEventListener('click', clearAllSelections);
        checkAdminMode();
      }

      init();
    })();
  </script>
</body>
</html>
