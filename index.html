<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Encuesta · Podium Beer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0.5rem;
    }
    .hero-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background-image: url('assets/bg_cerveceria.jpg');
      background-size: cover;
      background-position: center;
    }
    .overlay-color {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #06232E;
      opacity: 0.57;
      z-index: -1;
    }
    .vignette {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 0;
    }
    .app-container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .logo-header {
      display: block;
      margin: 0 auto 0.5rem auto;
      width: 60%;
      max-width: 200px;
      height: auto;
    }
    /* ✅ Frase grande debajo del logo, en una sola línea */
    .frase-destacada {
      text-align: center;
      color: #FFFFFF;
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0.2rem 0 1.5rem 0;
      white-space: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0.5rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .frase-destacada::-webkit-scrollbar { display: none; }

    /* Tarjetas glass */
    .glass-card {
      background: rgba(6,35,46,0.35);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      padding: 1.8rem 1.5rem;
      transition: transform 0.2s ease;
      position: relative;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      left: 11px;
      top: -10px;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background-image: url('assets/espejo.png');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
      pointer-events: none;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #f7c32f;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .question-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 1.2rem;
      line-height: 1.3;
      border-left: 5px solid #e32c6c;
      padding-left: 1rem;
    }
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .option-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #e32c6c;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .option-label {
      color: #FFFFFF;
      font-size: 1rem;
      line-height: 1.4;
      font-weight: 500;
    }
    .option-desc {
      display: block;
      font-size: 0.8rem;
      color: #CFDEE0;
      font-weight: 400;
      margin-top: 0.2rem;
    }

    /* Campo nombre cervecería */
    .brewery-name-card {
      background: rgba(6,35,46,0.35);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      padding: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .brewery-name-label {
      font-size: 1.2rem;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brewery-name-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 60px;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .brewery-name-input:focus { border-color: #f7c32f; }
    .brewery-name-input::placeholder { color: #9BB7C0; opacity: 0.7; }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .btn {
      background: linear-gradient(90deg, #E40F63, #C32263);
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(228,15,99,0.5);
      transition: transform 0.1s ease, filter 0.1s ease;
      font-weight: 700;
      font-size: 1rem;
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.2);
      min-width: 200px;
    }
    .btn:active { transform: scale(0.97); filter: brightness(0.92); }
    .btn-secondary {
      background: rgba(0,0,0,0.6);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .social-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0 0.5rem;
    }
    .social-icon {
      width: 36px;
      height: 36px;
      transition: transform 0.2s;
    }
    .social-icon:hover { transform: scale(1.1); }
    .credits {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #f7c32f;
      background: rgba(0,0,0,0.5);
      padding: 0.75rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-top: 1rem;
    }
    .status-message {
      color: #f7c32f;
      text-align: center;
      min-height: 1.8rem;
      font-weight: 500;
    }
    .admin-download {
      text-align: center;
      margin-top: 0.5rem;
    }
    .admin-btn {
      background: transparent;
      border: 1px dashed #f7c32f;
      color: #f7c32f;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .glass-card { padding: 1.5rem 1rem; }
      .question-text { font-size: 1.2rem; }
      .btn { padding: 10px 18px; min-width: 160px; }
      .social-icon { width: 30px; height: 30px; }
      .brewery-name-label { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="overlay-color"></div>
  <div class="vignette"></div>

  <div class="app-container">
    <div class="header">
      <img src="assets/Logo_Desde.png" alt="Podium Beer" class="logo-header">
      <!-- ✅ Frase corregida: grande y en una línea -->
      <div class="frase-destacada">Gracias por tu tiempo. Responde desde tu mirada</div>
    </div>

    <!-- Campo nombre cervecería -->
    <div class="brewery-name-card">
      <div class="brewery-name-label">
        <span>🍺</span> Nombre de tu cervecería
      </div>
      <input type="text" id="breweryNameInput" class="brewery-name-input" placeholder="Ej: Cerveza Artesanal del Sur" autocomplete="off">
    </div>

    <!-- Contenedor de preguntas (se llena con JS) -->
    <div id="questionsContainer" class="questions-list" style="display: flex; flex-direction: column; gap: 1.8rem;"></div>

    <div class="action-bar">
      <button class="btn" id="submitAnswersBtn">📤 Enviar respuestas</button>
      <button class="btn btn-secondary" id="clearAllBtn">🧹 Limpiar selecciones</button>
    </div>
    <div id="exportStatus" class="status-message"></div>

    <!-- Redes sociales -->
    <div class="social-bar">
      <a href="https://www.instagram.com/catascolaborativascl/" target="_blank" rel="noopener">
        <img src="assets/icon_instagram.png" alt="Instagram" class="social-icon">
      </a>
      <a href="https://catascolaborativas.cl/" target="_blank" rel="noopener">
        <img src="assets/icon_web.png" alt="Sitio Web" class="social-icon">
      </a>
      <a href="https://wa.me/56952184980" target="_blank" rel="noopener">
        <img src="assets/icon_wpp.png" alt="WhatsApp" class="social-icon">
      </a>
    </div>

    <div class="credits">
      Un desarrollo de Catas Colaborativas. Difundiendo Cultura Cervecera desde 2015
    </div>

    <!-- Panel admin (solo visible con ?admin) -->
    <div id="adminPanel" class="admin-download" style="display: none;">
      <button class="admin-btn" id="downloadAllDataBtn">📥 Descargar consolidado (Admin)</button>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const STORAGE_KEY = 'encuesta_respuestas';

      // ✅ 13 preguntas completas con todas las opciones
      const questionsData = [
        {
          id: 'q1', emoji: '💸', text: '¿Cómo decides qué cerveza producir?',
          options: [
            { value: 'intuicion', label: 'Intuición / experiencia', desc: '“lo que tú crees que puede funcionar”' },
            { value: 'tendencias', label: 'Tendencias de mercado', desc: '“lo que ves que está de moda o se está haciendo más”' },
            { value: 'feedback', label: 'Feedback de clientes', desc: '“lo que te piden o te comentan tus clientes”' },
            { value: 'datos_ventas', label: 'Datos de ventas', desc: '“lo que sabes que ya se vende bien en tu cervecería”' }
          ]
        },
        {
          id: 'q2', emoji: '💸', text: '¿Qué pesa más al tomar decisiones?',
          options: [
            { value: 'margen', label: 'Margen', desc: '“ganar más plata por cada cerveza”' },
            { value: 'rotacion', label: 'Rotación', desc: '“vender más volumen aunque ganes menos por unidad”' },
            { value: 'balance', label: 'Balance de ambos', desc: '“buscar equilibrio entre margen y volumen”' },
            { value: 'no_claro', label: 'No lo tengo claro', desc: '“no lo tengo definido o depende del momento”' }
          ]
        },
        {
          id: 'q3', emoji: '🍺', text: '¿Cómo defines tu línea de cervezas?',
          options: [
            { value: 'creatividad', label: 'Creatividad personal', desc: '“hacer lo que te gusta o te interesa como cervecero”' },
            { value: 'reaccion_mercado', label: 'Reacción al mercado', desc: '“adaptarte a lo que ves que se vende o funciona”' },
            { value: 'mixta', label: 'Mixta', desc: '“mezcla entre lo que te gusta y lo que pide el mercado”' },
            { value: 'no_definido', label: 'No definido', desc: '“no hay una estrategia clara”' }
          ]
        },
        {
          id: 'q4', emoji: '🍺', text: '¿Sigues tendencias o haces lo que te gusta?',
          options: [
            { value: 'gusto_personal', label: '100% gusto personal', desc: '“haces principalmente lo que te gusta a ti”' },
            { value: 'intuicion', label: 'Mayormente intuición', desc: '“decides según tu experiencia más que por datos”' },
            { value: 'mezcla_tendencias', label: 'Mezcla con tendencias', desc: '“consideras lo que se está moviendo en el mercado”' },
            { value: 'basado_mercado', label: 'Basado en mercado', desc: '“priorizas lo que sabes que se vende”' }
          ]
        },
        {
          id: 'q5', emoji: '🏆', text: '¿Por qué eliges los concursos?',
          options: [
            { value: 'prestigio', label: 'Prestigio del concurso', desc: '“porque es reconocido o tiene buen nombre”' },
            { value: 'costo', label: 'Costo', desc: '“porque es más accesible económicamente”' },
            { value: 'logistica', label: 'Logística / cercanía', desc: '“porque es más fácil enviar o participar”' },
            { value: 'costumbre', label: 'Costumbre / recomendación', desc: '“porque siempre participas ahí o te lo recomendaron”' }
          ]
        },
        {
          id: 'q6', emoji: '🏆', text: '¿Cómo eliges qué cerveza enviar?',
          options: [
            { value: 'mejor', label: 'La que crees mejor', desc: '“la que tú consideras de mejor calidad”' },
            { value: 'mas_vendida', label: 'La más vendida', desc: '“la que más se vende en tu cervecería”' },
            { value: 'ganadora', label: 'La que ya ha ganado', desc: '“una cerveza que ya tuvo buenos resultados”' },
            { value: 'sin_criterio', label: 'No hay criterio claro', desc: '“decides caso a caso sin una estrategia fija”' }
          ]
        },
        {
          id: 'q7', emoji: '🏆', text: '¿Con qué frecuencia participas?',
          options: [
            { value: '1_vez', label: '1 vez al año', desc: '“participas ocasionalmente”' },
            { value: '2_3_veces', label: '2–3 veces al año', desc: '“participación moderada”' },
            { value: '4_o_mas', label: '4 o más veces', desc: '“participas activamente en concursos”' },
            { value: 'no_participo', label: 'No participo', desc: '“no estás participando actualmente”' }
          ]
        },
        {
          id: 'q8', emoji: '🥇', text: '¿Las medallas te han generado ventas?',
          options: [
            { value: 'si_claramente', label: 'Sí, claramente', desc: '“notaste un aumento real en ventas”' },
            { value: 'algo', label: 'Algo', desc: '“sí ayudan, pero no mucho”' },
            { value: 'muy_poco', label: 'Muy poco', desc: '“casi no influyen”' },
            { value: 'nada', label: 'Nada', desc: '“no generan impacto en ventas”' }
          ]
        },
        {
          id: 'q9', emoji: '🥇', text: '¿Usas las medallas en tu comunicación?',
          options: [
            { value: 'siempre', label: 'Siempre', desc: '“las usas activamente en redes, etiquetas o ventas”' },
            { value: 'a_veces', label: 'A veces', desc: '“las mencionas, pero no de forma constante”' },
            { value: 'muy_poco', label: 'Muy poco', desc: '“casi no las usas”' },
            { value: 'nunca', label: 'Nunca', desc: '“no las utilizas en tu comunicación”' }
          ]
        },
        {
          id: 'q10', emoji: '📊', text: '¿Para ti los concursos valen la pena?',
          options: [
            { value: 'si_totalmente', label: 'Sí, totalmente', desc: '“crees que son una buena inversión”' },
            { value: 'depende', label: 'Depende', desc: '“a veces sí, a veces no”' },
            { value: 'poco', label: 'Poco', desc: '“no estás convencido de su valor”' },
            { value: 'no', label: 'No', desc: '“no crees que valgan la pena”' }
          ]
        },
        {
          id: 'q11', emoji: '📊', text: '¿Qué te frena para participar más?',
          options: [
            { value: 'costo', label: 'Costo', desc: '“es caro participar”' },
            { value: 'tiempo', label: 'Tiempo / gestión', desc: '“requiere mucho esfuerzo o coordinación”' },
            { value: 'logistica', label: 'Logística', desc: '“es difícil enviar o participar”' },
            { value: 'no_retorno', label: 'No veo retorno', desc: '“no ves beneficios claros”' }
          ]
        },
        {
          id: 'q12', emoji: '🧠', text: '¿Sabes tu posición en el mercado?',
          options: [
            { value: 'si_claramente', label: 'Sí, claramente', desc: '“tienes claro en qué nivel estás”' },
            { value: 'mas_o_menos', label: 'Más o menos', desc: '“tienes una idea general”' },
            { value: 'intuicion', label: 'Intuición', desc: '“lo sientes, pero no lo has medido”' },
            { value: 'no', label: 'No', desc: '“no sabes realmente dónde estás”' }
          ]
        },
        {
          id: 'q13', emoji: '🌍', text: '¿Cómo ves el futuro del mercado?',
          options: [
            { value: 'muy_optimista', label: 'Muy optimista', desc: '“ves muchas oportunidades”' },
            { value: 'moderado', label: 'Moderado', desc: '“crees que habrá crecimiento, pero con desafíos”' },
            { value: 'preocupado', label: 'Preocupado', desc: '“ves dificultades importantes”' },
            { value: 'pesimista', label: 'Pesimista', desc: '“crees que el escenario será complejo”' }
          ]
        }
      ];

      const container = document.getElementById('questionsContainer');
      const submitBtn = document.getElementById('submitAnswersBtn');
      const clearBtn = document.getElementById('clearAllBtn');
      const statusEl = document.getElementById('exportStatus');
      const breweryNameInput = document.getElementById('breweryNameInput');

      function renderQuestions() {
        let html = '';
        questionsData.forEach((q, index) => {
          html += `<div class="glass-card" data-qid="${q.id}">
            <div class="section-title">${q.emoji} PREGUNTA ${index+1}</div>
            <div class="question-text">${q.text}</div>
            <div class="options-grid">`;
          q.options.forEach((opt, optIdx) => {
            const inputId = `${q.id}_opt${optIdx}`;
            html += `<div class="option-item">
              <input type="checkbox" id="${inputId}" name="${q.id}" value="${opt.value}">
              <label for="${inputId}" class="option-label">${opt.label}<span class="option-desc">${opt.desc}</span></label>
            </div>`;
          });
          html += `</div></div>`;
        });
        container.innerHTML = html;
      }

      function collectAnswers() {
        const breweryName = breweryNameInput.value.trim() || '(sin nombre)';
        const answers = [];
        questionsData.forEach(q => {
          const checkboxes = document.querySelectorAll(`input[name="${q.id}"]:checked`);
          const selectedLabels = Array.from(checkboxes).map(cb => {
            const label = document.querySelector(`label[for="${cb.id}"]`);
            return label ? label.childNodes[0].nodeValue.trim() : cb.value;
          });
          answers.push({
            questionId: q.id,
            questionText: q.text,
            selectedLabels: selectedLabels,
            selectedValues: Array.from(checkboxes).map(cb => cb.value)
          });
        });
        return { breweryName, answers };
      }

      function saveResponseToStorage(response) {
        const stored = localStorage.getItem(STORAGE_KEY);
        let allResponses = stored ? JSON.parse(stored) : [];
        allResponses.push({
          timestamp: new Date().toISOString(),
          breweryName: response.breweryName,
          answers: response.answers
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allResponses));
      }

      function handleSubmit() {
        const response = collectAnswers();
        if (response.answers.every(a => a.selectedLabels.length === 0)) {
          statusEl.textContent = '⚠️ Por favor selecciona al menos una opción en alguna pregunta.';
          setTimeout(() => statusEl.textContent = '', 3000);
          return;
        }
        saveResponseToStorage(response);
        clearAllSelections();
        breweryNameInput.value = '';
        statusEl.textContent = '✅ ¡Gracias! Tus respuestas han sido registradas.';
        setTimeout(() => statusEl.textContent = '', 4000);
      }

      function clearAllSelections() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      }

      function downloadAllDataAsCSV() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) { alert('No hay respuestas guardadas aún.'); return; }
        const allResponses = JSON.parse(stored);
        let csvRows = [];
        const headers = ['Timestamp', 'Cervecería', ...questionsData.map(q => q.text.replace(/,/g, ';'))];
        csvRows.push(headers.join(','));
        allResponses.forEach(record => {
          const row = [record.timestamp, `"${record.breweryName.replace(/"/g, '""')}"`];
          questionsData.forEach(q => {
            const ans = record.answers.find(a => a.questionId === q.id);
            row.push(`"${ans ? ans.selectedLabels.join('; ') : ''}"`);
          });
          csvRows.push(row.join(','));
        });
        const csvString = csvRows.join('\n');
        const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `consolidado_encuesta_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function checkAdminMode() {
        if (window.location.search.includes('admin')) {
          document.getElementById('adminPanel').style.display = 'block';
          document.getElementById('downloadAllDataBtn').addEventListener('click', downloadAllDataAsCSV);
        }
      }

      function init() {
        renderQuestions();
        submitBtn.addEventListener('click', handleSubmit);
        clearBtn.addEventListener('click', clearAllSelections);
        checkAdminMode();
      }

      init();
    })();
  </script>
</body>
</html>
